<!DOCTYPE html>
<html>
<head>
    <title>View Properties</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .property-img {
            height: 200px;
            object-fit: cover;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body class="container mt-5">

<h2 class="mb-4 text-center">🏠 All Properties</h2>

<div class="row g-4">

{% for property in properties %}
<div class="col-md-4">

    <div class="card shadow">

        <!-- 🔥 PROPERTY IMAGE -->
        <img src="https://images.unsplash.com/photo-1564013799919-ab600027ffc6"
             class="card-img-top property-img">

        <div class="card-body text-center">

            <h5 class="card-title">{{ property[1] }}</h5>

            <p class="text-muted">📍 {{ property[2] }}</p>

            <p class="price">₹{{ "{:,.0f}".format(property[3]) }}</p>

            <p><b>Type:</b> {{ property[4] }}</p>

            {% if property[5] == 'Available' %}
                <span class="badge bg-success">Available</span>
            {% else %}
                <span class="badge bg-danger">Sold</span>
            {% endif %}

            <hr>

            <!-- ACTION BUTTONS -->
            <a href="/edit_property/{{ property[0] }}" class="btn btn-warning btn-sm">Edit</a>

            <a href="/delete_property/{{ property[0] }}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure?');">
               Delete
            </a>

            <a href="/mark_sold/{{ property[0] }}" class="btn btn-success btn-sm">
                Mark Sold
            </a>

        </div>

    </div>

</div>
{% endfor %}

</div>

<br><br>

<div class="text-center">
    <a href="/admin" class="btn btn-secondary">⬅ Back to Dashboard</a>
</div>

</body>
</html>
