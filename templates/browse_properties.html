<!DOCTYPE html>
<html>
<head>
    <title>Browse Properties</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .property-card {
            border-radius: 15px;
            transition: 0.3s;
            overflow: hidden;
            cursor: pointer;
        }

        .property-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .property-img {
            height: 200px;
            object-fit: cover;
        }

        .price {
            color: green;
            font-weight: bold;
            font-size: 18px;
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        a.card-link {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>

<body class="container mt-5">

<h2 class="mb-4 text-center">🏡 Available Properties</h2>

<!-- 🔍 SEARCH -->
<div class="search-box mb-4">
<form method="GET" action="/browse_properties" class="row g-3">

    <div class="col-md-3">
        <select name="location" class="form-control">
            <option value="">All Locations</option>
            <option value="Trichy">Trichy</option>
            <option value="Chennai">Chennai</option>
            <option value="Coimbatore">Coimbatore</option>
            <option value="Madurai">Madurai</option>
        </select>
    </div>

    <div class="col-md-3">
        <input type="range" name="price" min="100000" max="10000000" step="50000"
               class="form-range" oninput="priceValue.innerText=this.value">
        <small>Max Price: ₹<span id="priceValue">5000000</span></small>
    </div>

    <div class="col-md-3">
        <select name="sort" class="form-control">
            <option value="">Sort By</option>
            <option value="low">Price: Low → High</option>
            <option value="high">Price: High → Low</option>
        </select>
    </div>

    <div class="col-md-3">
        <button type="submit" class="btn btn-primary w-100">Search</button>
    </div>

</form>
</div>

<!-- 🏠 PROPERTY CARDS -->
<div class="row g-4">

{% for property in properties %}
<div class="col-md-4">

    <!-- 🔥 FULL CARD CLICKABLE -->
    <a href="/property/{{ property[0] }}" class="card-link">

        <div class="card shadow property-card">

            <img src="{{ property[6] }}" class="card-img-top property-img">

            <div class="card-body text-center">

                <h5 class="card-title">{{ property[1] }}</h5>

                <p class="text-muted">📍 {{ property[2] }}</p>

                <p class="price">₹{{ "{:,.0f}".format(property[3]) }}</p>

                <p><b>Type:</b> {{ property[4] }}</p>

                <span class="badge bg-success">{{ property[5] }}</span>

                <hr>

                <!-- 🔥 VIEW DETAILS BUTTON -->
                <div class="btn btn-primary w-100">
                    View Details
                </div>

            </div>

        </div>

    </a>

</div>
{% endfor %}

</div>

<br>

<div class="text-center">
    <a href="/buyer" class="btn btn-secondary">⬅ Back</a>
    <a href="/logout" class="btn btn-danger">Logout</a>
</div>

</body>
</html>
