<!DOCTYPE html>
<html>
<head>
    <title>Real Estate Login</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;

            /* 🔥 BACKGROUND IMAGE */
            background: url('https://images.unsplash.com/photo-1564013799919-ab600027ffc6') no-repeat center center/cover;

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔥 DARK OVERLAY */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .login-box {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #2980b9;
        }

        a {
            display: block;
            margin: 10px 0;
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="login-box">
    <h2>🏠 Real Estate Login</h2>

    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <a href="/register">Create Account</a>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
