<!DOCTYPE html>
<html>
<head>
    <title>Buyer Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;

            /* 🔥 REAL ESTATE BACKGROUND */
         background: url('https://images.unsplash.com/photo-1501183638710-841dd1904471') no-repeat center center/cover;
            height: 100vh;
        }

        /* 🔥 DARK OVERLAY */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        .dashboard-box {
            position: relative;
            max-width: 400px;
            margin: auto;
            margin-top: 120px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .btn:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>

<body>

<div class="dashboard-box">

    <h2>🏠 Buyer Dashboard</h2>

    <!-- 🔥 Welcome message -->
    <p>Welcome, <b>{{ session['username'] }}</b></p>

    <a href="/browse_properties" class="btn btn-primary">🔍 Browse Properties</a>

    <a href="/logout" class="btn btn-danger">🚪 Logout</a>

</div>

</body>
</html>
