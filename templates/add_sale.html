<!DOCTYPE html>
<html>
<head>
    <title>Add Sale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>🏠 Record Property Sale</h2>

<form method="POST">

    <label>Buyer</label>
    <select name="buyer_name" class="form-control" required>
        {% for b in buyers %}
        <option value="{{ b[0] }}">{{ b[0] }}</option>
        {% endfor %}
    </select>

    <br>

    <label>Property</label>
    <select name="property_id" class="form-control" required>
        {% for p in properties %}
        <option value="{{ p[0] }}">{{ p[1] }}</option>
        {% endfor %}
    </select>

    <br>

    <label>Agent</label>
    <select name="agent_name" class="form-control" required>
        {% for a in agents %}
        <option value="{{ a[0] }}">{{ a[0] }}</option>
        {% endfor %}
    </select>

    <br>

    <label>Sale Price</label>
    <input type="number" name="sale_price" class="form-control" required>

    <br>

    <label>Sale Date</label>
    <input type="date" name="sale_date" class="form-control" required>

    <br>

    <button class="btn btn-success">Save Sale</button>

</form>

</body>
</html>
