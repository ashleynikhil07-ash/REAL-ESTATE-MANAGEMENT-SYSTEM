<!DOCTYPE html>
<html>
<head>
    <title>Edit Property</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        .form-container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: white;
            text-align: center;
        }

        .preview-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body class="container mt-5">

<h2 class="mb-4">✏️ Edit Property</h2>

<div class="form-container">

<form method="POST">

    <!-- 🔥 IMAGE PREVIEW -->
    <img src="{{ property[6] }}" class="preview-img">

    <div class="mb-3">
        <label>Title</label>
        <input type="text" name="title" value="{{ property[1] }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Location</label>
        <input type="text" name="location" value="{{ property[2] }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Price</label>
        <input type="number" name="price" value="{{ property[3] }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Property Type</label>
        <input type="text" name="property_type" value="{{ property[4] }}" class="form-control" required>
    </div>

    <!-- 🔥 NEW IMAGE FIELD -->
    <div class="mb-3">
        <label>Image URL</label>
        <input type="text" name="image_url" value="{{ property[6] }}" class="form-control">
    </div>

    <button type="submit" class="btn btn-success w-100">Update Property</button>

</form>

<br>

<a href="/view_properties" class="btn btn-secondary w-100">⬅ Back</a>

</div>

</body>
</html>
