<!DOCTYPE html>
<html>
<head>
    <title>Agent Properties</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>🏠 Manage Properties</h2>

<table class="table table-bordered mt-4">
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Location</th>
    <th>Price</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for p in properties %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>{{ p[2] }}</td>
    <td>{{ p[3] }}</td>
    <td>{{ p[5] }}</td>
    <td>
        <a href="/mark_sold/{{ p[0] }}" class="btn btn-success btn-sm">Mark Sold</a>
    </td>
</tr>
{% endfor %}
</table>

<a href="/agent" class="btn btn-primary">Back</a>

</body>
</html>
