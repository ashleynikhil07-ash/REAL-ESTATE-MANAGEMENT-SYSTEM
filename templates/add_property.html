<!DOCTYPE html>
<html>
<head>
    <title>Add Property</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        .form-container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: white;
        }
    </style>
</head>

<body class="container mt-5">

<h2 class="text-center mb-4">➕ Add Property</h2>

<div class="form-container">

<form method="POST">

    <div class="mb-3">
        <label>Title</label>
        <input type="text" name="title" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Location</label>
        <input type="text" name="location" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Price</label>
        <input type="number" name="price" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Property Type</label>
        <input type="text" name="property_type" class="form-control" required>
    </div>

    <!-- 🔥 NEW IMAGE FIELD -->
    <div class="mb-3">
        <label>Image URL</label>
        <input type="text" name="image_url" class="form-control" 
               placeholder="Paste image link (Unsplash recommended)" required>
    </div>

    <button type="submit" class="btn btn-success w-100">Add Property</button>

</form>

<br>

<a href="/admin" class="btn btn-secondary w-100">⬅ Back</a>

</div>

</body>
</html>
