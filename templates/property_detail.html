<!DOCTYPE html>
<html>
<head>
    <title>Property Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
        }

        .property-img {
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
        }
    </style>
</head>

<body class="container mt-5">

<h2 class="mb-4 text-center">🏠 Property Details</h2>

<div class="card shadow p-4">

    <img src="{{ property[6] }}" class="property-img mb-3">

    <h3>{{ property[1] }}</h3>

    <p><b>📍 Location:</b> {{ property[2] }}</p>

    <p><b>💰 Price:</b> ₹{{ property[3] }}</p>

    <p><b>🏠 Type:</b> {{ property[4] }}</p>

    <p><b>Status:</b> {{ property[5] }}</p>

    <a href="/book/{{ property[0] }}" class="btn btn-primary">📅 Book Visit</a>

    <a href="/payment/{{ property[0] }}" class="btn btn-success mt-2">
    💳 Proceed to Payment
</a>

</div>

<br>

<a href="/browse_properties" class="btn btn-secondary">⬅ Back</a>

</body>
</html>
