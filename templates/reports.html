<!DOCTYPE html>
<html>
<head>
    <title>Reports Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>

<body class="container mt-5">

<h2>📊 Property Reports</h2>

<div class="row text-center mb-4">

    <div class="col-md-4">
        <div class="card p-3 shadow bg-light text-dark">
            <h5>Total Properties</h5>
            <h2>{{ total_properties }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 shadow bg-success text-white">
            <h5>Sold</h5>
            <h2>{{ total_sold }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 shadow bg-warning text-dark">
            <h5>Available</h5>
            <h2>{{ total_available }}</h2>
        </div>
    </div>

</div>

<div class="chart-box">
    <canvas id="myChart"></canvas>
</div>

<br>

<div class="text-center">
    <a href="/admin" class="btn btn-light">⬅ Back</a>
</div>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Total', 'Sold', 'Available'],
        datasets: [{
            label: 'Property Statistics',
            data: [{{ total_properties }}, {{ total_sold }}, {{ total_available }}]
        }]
    },
    options: {
        plugins: {
            legend: {
                labels: {
                    color: 'black'
                }
            }
        },
        scales: {
            x: {
                ticks: { color: 'black' }
            },
            y: {
                ticks: { color: 'black' }
            }
        }
    }
});
</script>

</body>
</html>
