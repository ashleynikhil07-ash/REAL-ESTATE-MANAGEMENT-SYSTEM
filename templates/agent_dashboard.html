<!DOCTYPE html>
<html>
<head>
    <title>Agent Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card a {
            text-decoration: none;
        }

        .stat-card {
            border-radius: 15px;
        }
    </style>
</head>

<body class="container mt-5">

<h2 class="text-center mb-4">👨‍💼 Agent Dashboard</h2>

<!-- 🔥 WELCOME -->
<p class="text-center">Welcome, <b>{{ session['username'] }}</b></p>

<!-- 🔥 QUICK STATS -->
<div class="row text-center mb-4">

    <div class="col-md-4">
        <div class="card p-3 bg-light text-dark stat-card">
            <h5>Total Appointments</h5>
            <h3>{{ total }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 bg-success text-white stat-card">
            <h5>Successful Visits</h5>
            <h3>{{ success }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 bg-warning text-dark stat-card">
            <h5>Pending Visits</h5>
            <h3>{{ pending }}</h3>
        </div>
    </div>

</div>

<!-- 🔥 ACTION CARDS -->
<div class="row g-4">

    <div class="col-md-4">
        <div class="card text-center p-4 shadow bg-white text-dark">
            <h5>🏠 Manage Properties</h5>
            <a href="/agent_properties" class="btn btn-primary">Open</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center p-4 shadow bg-white text-dark">
            <h5>📅 View Appointments</h5>
            <a href="/agent_appointments" class="btn btn-warning">Open</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center p-4 shadow bg-white text-dark">
            <h5>🚪 Logout</h5>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

</div>

</body>
</html>
